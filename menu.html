<!DOCTYPE html>
<html>
<head>
<title>Iron & Mud - Menu</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
}

#background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.85));
}

#title{
    position:absolute;
    top:50px;
    width:100%;
    text-align:center;
}

#title h1{
    font-size:72px;
    margin:0;
}

#title h3{
    margin-top:10px;
    color:#ccc;
}

#menu{
    position:absolute;
    left:50%;
    top:220px;
    transform:translateX(-50%);
    text-align:center;
}

.btn{
    width:300px;
    padding:15px;
    margin:10px;
    border:2px solid white;
    cursor:pointer;
    font-size:24px;
    transition:.2s;
}

.btn:hover{
    background:white;
    color:black;
}

#version{
    position:absolute;
    bottom:10px;
    right:15px;
    color:#999;
}
</style>
</head>

<body>

<div id="background"></div>

<div id="title">
    <h1>IRON & MUD</h1>
    <h3>1939 - 1941</h3>
</div>

<div id="menu">

    <div class="btn" onclick="alert('Coming Soon')">
        PLAY
    </div>

    <div class="btn" onclick="alert('Create Soldier Coming Soon')">
        CREATE SOLDIER
    </div>

    <div class="btn" onclick="alert('Historical Characters Coming Soon')">
        HISTORICAL CHARACTERS
    </div>

    <div class="btn" onclick="alert('Encyclopedia Coming Soon')">
        ENCYCLOPEDIA
    </div>

    <div class="btn" onclick="alert('Settings Coming Soon')">
        SETTINGS
    </div>

    <div class="btn" onclick="alert('Iron & Mud Prototype')">
        CREDITS
    </div>

</div>

<div id="version">
v0.1 Prototype
</div>

</body>
</html>
